<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 11 10">
  <rect width="11" height="10" fill="#000"/>
  <g fill="#00FF70" transform="translate(1,1)">
    <!-- row 0: antennae -->
    <rect x="1" y="0" width="1" height="1"/>
    <rect x="7" y="0" width="1" height="1"/>
    <!-- row 1: shoulder/head sides -->
    <rect x="0" y="1" width="1" height="1"/>
    <rect x="2" y="1" width="5" height="1"/>
    <rect x="8" y="1" width="1" height="1"/>
    <!-- row 2: full head -->
    <rect x="0" y="2" width="9" height="1"/>
    <!-- row 3: body with two eye holes -->
    <rect x="0" y="3" width="2" height="1"/>
    <rect x="3" y="3" width="3" height="1"/>
    <rect x="7" y="3" width="2" height="1"/>
    <!-- row 4: full body -->
    <rect x="0" y="4" width="9" height="1"/>
    <!-- row 5: mid body -->
    <rect x="1" y="5" width="7" height="1"/>
    <!-- row 6: claws -->
    <rect x="0" y="6" width="1" height="1"/>
    <rect x="8" y="6" width="1" height="1"/>
    <!-- row 7: claw feet -->
    <rect x="1" y="7" width="1" height="1"/>
    <rect x="7" y="7" width="1" height="1"/>
  </g>
</svg>
