<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
    <title>Space GPU</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: monospace;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
      #error-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: #000;
        color: #0f0;
        font-family: monospace;
        font-size: 1.2rem;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        line-height: 1.6;
      }
      #error-overlay.visible {
        display: flex;
      }

      /* ── Touch controls (shown only on coarse-pointer / touchscreen devices) ── */
      #touch-controls {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px 24px;
        justify-content: space-between;
        align-items: flex-end;
        z-index: 10;
      }
      @media (pointer: coarse) {
        #touch-controls { display: flex; }
      }
      .touch-group {
        display: flex;
        gap: 14px;
      }
      .touch-btn {
        width: 76px;
        height: 76px;
        border-radius: 50%;
        border: 2px solid rgba(0,255,0,0.6);
        background: rgba(0,255,0,0.08);
        color: #0f0;
        font-size: 1.6rem;
        font-family: monospace;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 80ms;
      }
      .touch-btn:active,
      .touch-btn.active {
        background: rgba(0,255,0,0.28);
      }
      #btn-fire {
        width: 96px;
        height: 96px;
        font-size: 0.85rem;
        font-weight: bold;
        letter-spacing: 2px;
        border-color: rgba(0,255,0,0.9);
        background: rgba(0,255,0,0.12);
      }
      #btn-pause {
        position: fixed;
        top: 16px;
        right: 16px;
        width: 44px;
        height: 44px;
        font-size: 1rem;
        border-color: rgba(0,255,0,0.4);
        background: rgba(0,255,0,0.06);
        display: none;
      }
      @media (pointer: coarse) {
        #btn-pause { display: flex; }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="error-overlay"></div>

    <button id="btn-pause" class="touch-btn" aria-label="Pause">&#9646;&#9646;</button>

    <div id="touch-controls">
      <div class="touch-group">
        <button id="btn-left"  class="touch-btn" aria-label="Move left">&#9664;</button>
        <button id="btn-right" class="touch-btn" aria-label="Move right">&#9654;</button>
      </div>
      <div class="touch-group">
        <button id="btn-auto-fire" class="touch-btn" aria-label="Toggle auto-fire">AUTO</button>
        <button id="btn-fire"      class="touch-btn" aria-label="Fire">FIRE</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
