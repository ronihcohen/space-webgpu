<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
    <title>Space GPU</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: monospace;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
      #error-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: #000;
        color: #0f0;
        font-family: monospace;
        font-size: 1.2rem;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        line-height: 1.6;
      }
      #error-overlay.visible {
        display: flex;
      }
      #leaderboard-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 20;
        background: rgba(0, 0, 0, 0.94);
        color: #0f0;
        font-family: monospace;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      #leaderboard-overlay.visible { display: flex; }
      .leaderboard-panel {
        width: min(440px, 100%);
        max-height: calc(100dvh - 48px);
        overflow-y: auto;
        border: 1px solid rgba(0, 255, 0, 0.7);
        padding: 20px;
        background: #000;
      }
      .leaderboard-panel h1 {
        font-size: 1.1rem;
        margin-bottom: 16px;
        text-align: center;
        letter-spacing: 0;
      }
      .leaderboard-list {
        list-style: none;
        display: grid;
        gap: 6px;
        min-height: 80px;
        margin-bottom: 14px;
      }
      .leaderboard-list li {
        display: grid;
        grid-template-columns: 32px 1fr auto;
        gap: 10px;
        align-items: center;
      }
      .leaderboard-list strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .leaderboard-list em {
        font-style: normal;
        color: #fff;
      }
      .leaderboard-empty {
        grid-template-columns: 1fr !important;
        color: rgba(0, 255, 0, 0.75);
      }
      .leaderboard-status {
        min-height: 1.2em;
        margin-bottom: 14px;
        color: #fff;
      }
      .leaderboard-submit {
        border-top: 1px solid rgba(0, 255, 0, 0.35);
        border-bottom: 1px solid rgba(0, 255, 0, 0.35);
        padding: 14px 0;
        margin-bottom: 16px;
      }
      #leaderboard-form {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 8px;
        align-items: center;
        margin-top: 10px;
      }
      #leaderboard-name {
        min-width: 0;
        border: 1px solid rgba(0, 255, 0, 0.7);
        background: #020;
        color: #fff;
        font: inherit;
        padding: 8px;
      }
      #leaderboard-form button,
      #leaderboard-again {
        border: 1px solid rgba(0, 255, 0, 0.8);
        background: rgba(0, 255, 0, 0.08);
        color: #0f0;
        font: inherit;
        padding: 8px 10px;
        cursor: pointer;
      }
      #leaderboard-form button:disabled {
        cursor: default;
        opacity: 0.45;
      }
      #leaderboard-again {
        width: 100%;
      }
      .leaderboard-note {
        margin-top: 10px;
        color: rgba(0, 255, 0, 0.75);
      }

      /* ── Touch controls (shown only on coarse-pointer / touchscreen devices) ── */
      #touch-controls {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px 24px;
        justify-content: space-between;
        align-items: flex-end;
        z-index: 10;
      }
      @media (pointer: coarse) {
        #touch-controls { display: flex; }
        body {
          justify-content: flex-start;
          padding-bottom: 140px;
        }
      }
      .touch-group {
        display: flex;
        gap: 14px;
      }
      .touch-btn {
        width: 76px;
        height: 76px;
        border-radius: 50%;
        border: 2px solid rgba(0,255,0,0.6);
        background: rgba(0,255,0,0.08);
        color: #0f0;
        font-size: 1.6rem;
        font-family: monospace;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 80ms;
      }
      .touch-btn:active,
      .touch-btn.active {
        background: rgba(0,255,0,0.28);
      }
      #btn-left,
      #btn-right {
        width: 88px;
        height: 88px;
        font-size: 1.8rem;
      }
      #btn-start {
        width: 96px;
        height: 96px;
        font-size: 0.75rem;
        font-weight: bold;
        letter-spacing: 1px;
        border-color: rgba(0,255,0,0.9);
        background: rgba(0,255,0,0.12);
      }
      #btn-pause {
        position: fixed;
        top: 16px;
        right: 16px;
        width: 44px;
        height: 44px;
        font-size: 1rem;
        border-color: rgba(0,255,0,0.4);
        background: rgba(0,255,0,0.06);
        display: none;
      }
      @media (pointer: coarse) {
        #btn-pause { display: flex; }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="error-overlay"></div>
    <div id="leaderboard-overlay"></div>

    <button id="btn-pause" class="touch-btn" aria-label="Pause">&#9646;&#9646;</button>

    <div id="touch-controls">
      <div class="touch-group">
        <button id="btn-left"  class="touch-btn" aria-label="Move left">&#9664;</button>
        <button id="btn-right" class="touch-btn" aria-label="Move right">&#9654;</button>
      </div>
      <div class="touch-group">
        <button id="btn-start" class="touch-btn" aria-label="Start / fire">START</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
